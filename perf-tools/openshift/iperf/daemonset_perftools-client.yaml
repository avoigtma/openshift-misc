apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: perftools-client
    app.kubernetes.io/component: perftools
    app.kubernetes.io/instance: perftools-client
    app.kubernetes.io/name: perftools
    app.kubernetes.io/part-of: perftools-app
    app.openshift.io/runtime: perftools
    app.openshift.io/runtime-namespace: perftools
    app.openshift.io/runtime-version: latest
  name: perftools-client
  namespace: perftools
spec:
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: perftools-client
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: perftools-client
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - |
          #!/bin/bash
          while (true); do date +%F--%H-%M-%S; echo "please use the container terminal ... "; echo ""; sleep 60; done
        image: quay.io/avoigtma/perftools:latest
        imagePullPolicy: Always
        name: perftools-client
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
  updateStrategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
