apiVersion: v1
kind: ServiceAccount
metadata:
  name: central-log-collector
  namespace: openshift-logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: logforward-application
  namespace: openshift-logging
roleRef:                                           
  apiGroup: rbac.authorization.k8s.io              
  kind: ClusterRole                                
  name: collect-application-logs                 
subjects:                                          
  - kind: ServiceAccount                           
    name: central-log-collector                 
    namespace: openshift-logging                   
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: logforward-infrastructure
  namespace: openshift-logging
roleRef:                                           
  apiGroup: rbac.authorization.k8s.io              
  kind: ClusterRole                                
  name: collect-infrastructure-logs                 
subjects:                                          
  - kind: ServiceAccount                           
    name: central-log-collector                 
    namespace: openshift-logging                   
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: logforward-audit
  namespace: openshift-logging
roleRef:                                           
  apiGroup: rbac.authorization.k8s.io              
  kind: ClusterRole                                
  name: collect-audit-logs                 
subjects:                                          
  - kind: ServiceAccount                           
    name: central-log-collector                 
    namespace: openshift-logging                   
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: logforward-logwriter
  namespace: openshift-logging
roleRef:                                           
  apiGroup: rbac.authorization.k8s.io              
  kind: ClusterRole                                
  name: logging-collector-logs-writer                
subjects:                                          
  - kind: ServiceAccount                           
    name: central-log-collector                 
    namespace: openshift-logging                   
